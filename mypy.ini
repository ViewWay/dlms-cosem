[mypy]
python_version = 3.10
warn_return_any = False
warn_unused_configs = True
check_untyped_defs = False
no_implicit_optional = True
warn_unused_ignores = False
warn_no_return = True
follow_imports = silent
ignore_missing_imports = true

# Tests
[mypy-tests.*]
ignore_errors = true

# COSEM IC classes
[mypy-dlms_cosem.cosem.*]
ignore_errors = true

# Protocol layer
[mypy-dlms_cosem.protocol.*]
ignore_errors = true

# Transport
[mypy-dlms_cosem.transport.*]
ignore_errors = true

# CLI
[mypy-dlms_cosem.cli.*]
ignore_errors = true

# Key management
[mypy-dlms_cosem.key_management.*]
ignore_errors = true

# State machines
[mypy-dlms_cosem.hdlc.state]
ignore_errors = true
[mypy-dlms_cosem.hdlc.enhanced_state]
ignore_errors = true
[mypy-dlms_cosem.state]
ignore_errors = true

# Complex modules
[mypy-dlms_cosem.connection]
ignore_errors = true
[mypy-dlms_cosem.server]
ignore_errors = true
[mypy-dlms_cosem.parsers]
ignore_errors = true
[mypy-dlms_cosem.a_xdr]
ignore_errors = true
[mypy-dlms_cosem.security]
ignore_errors = true
[mypy-dlms_cosem.analytics]
ignore_errors = true
[mypy-dlms_cosem.io]
ignore_errors = true

[[mypy.plugins]]
name = "mypy_attrs"
